name: academy_platform
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  # Firebase core runtime. firebase_options.dart is generated by
  # `flutterfire configure` (see CLAUDE.md / Firebase setup).
  firebase_core: ^3.6.0
  # Email/password sign-in and Firestore for regions/instructors/trainees.
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  webview_windows: ^0.4.0
  xml: ^6.5.0
  # Microsoft (Entra ID) sign-in: OAuth2 auth-code + PKCE via the system
  # browser with a loopback redirect. See lib/auth/.
  url_launcher: ^6.3.0
  http: ^1.2.0
  crypto: ^3.0.3
  material_table_view: ^5.5.1
  flutter_tabler_icons: ^1.43.0
  flutter_svg: ^2.0.10
  # Brand typography: Bricolage Grotesque (display) + Manrope (UI/body).
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Generates app launcher icons from the Nahdi Academy mark.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/brand/logo/
  # Courses are NOT bundled as assets. They are read from the filesystem at
  # runtime (see CourseRepository), so new SCORM folders can be dropped into
  # assets/courses/ without editing this file or rebuilding.

# Launcher icon generation (run manually; see command below — not run on build).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/brand/logo/appicon-ios-teal-1024.png"
  adaptive_icon_background: "#00444F"
  adaptive_icon_foreground: "assets/brand/logo/appicon-android-1024.png"
