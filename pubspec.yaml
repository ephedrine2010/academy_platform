name: academy_platform
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  # Firebase core runtime. firebase_options.dart is generated by
  # `flutterfire configure` (see CLAUDE.md / Firebase setup).
  firebase_core: ^3.6.0
  # Email/password sign-in and Firestore for regions/contractors/trainees.
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  webview_windows: ^0.4.0
  xml: ^6.5.0
  # Microsoft (Entra ID) sign-in: OAuth2 auth-code + PKCE via the system
  # browser with a loopback redirect. See lib/auth/.
  url_launcher: ^6.3.0
  http: ^1.2.0
  crypto: ^3.0.3
  material_table_view: ^5.5.1
  flutter_tabler_icons: ^1.43.0
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  # Courses are NOT bundled as assets. They are read from the filesystem at
  # runtime (see CourseRepository), so new SCORM folders can be dropped into
  # assets/courses/ without editing this file or rebuilding.
